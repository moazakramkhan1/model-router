name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install production + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install -r app/requirements-dev.txt

      - name: Lint with ruff
        run: ruff check app/ --select E,W,F --ignore E501

      - name: Run tests
        env:
          CONFIG_DIR: ${{ github.workspace }}/config
          LOCAL_BASE_URL: http://localhost:11434  # won't be hit; providers are mocked
        run: |
          cd app
          pytest tests/ -v --tb=short --asyncio-mode=auto

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build router-api image
        run: docker build -t model-router:ci ./app
